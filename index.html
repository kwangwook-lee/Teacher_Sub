,,고재덕,안은수,노우선,김지수,고경미,김현정,최승희 D - 1,최정곤 D - 1,김성년 D - 1,이동규 D - 1,강슬기 D - 1,아원미 D - 1,이정인 D - 1,정미영 F - 1,남송현 F - 1,유지연 F - 1,김창훈 F - 1,최미리 F - 1,안준범 F - 1,송병훈 F - 1
,창의적 체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험,창의적체험
,,김현정,류제원,고경미,이광욱,노우선,추재훈,임성숙,구정훈,신선경,박태완,신은경,송병훈,강슬기,유경희,남송현,이소진,권민지,안준범,김병희,김창훈
,창의적 체험,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리,동아리
,,,,,,,,,,,,,,,,,,,,,
`;
        // ============================================================================


        const App = () => {
            const [activeTab, setActiveTab] = useState('register');
            const [teachersMaster, setTeachersMaster] = useState([]);
            const [selectedSemester, setSelectedSemester] = useState("2026-1");
            
            // 로컬 스토리지에서 누적 기록 불러오기
            const [subHistory, setSubHistory] = useState(() => {
                const saved = localStorage.getItem('smartSubHistory');
                return saved ? JSON.parse(saved) : [];
            });
            
            // UI States
            const [modalTeacher, setModalTeacher] = useState(null);
            const [toastMsg, setToastMsg] = useState(null);

            // Input States
            const [selectedAbsent, setSelectedAbsent] = useState("");
            const [selectedDay, setSelectedDay] = useState("mon");
            const [selectedPeriod, setSelectedPeriod] = useState(0);

            // --- 선택된 교사의 요일별 실제 수업 교시 계산 로직 ---
            const availablePeriods = useMemo(() => {
                if (!selectedAbsent || teachersMaster.length === 0) return [0, 1, 2, 3, 4, 5, 6];
                const absentTeacher = teachersMaster.find(t => t.name === selectedAbsent);
                if (!absentTeacher) return [0, 1, 2, 3, 4, 5, 6];
                
                const daySchedule = absentTeacher.schedule[selectedDay];
                const periods = [];
                for (let i = 0; i < 7; i++) {
                    // 빈칸이 아니면 수업이 있는 것으로 간주
                    if (daySchedule[i] && daySchedule[i].trim() !== "" && daySchedule[i].trim() !== "-") {
                        periods.push(i);
                    }
                }
                return periods;
            }, [selectedAbsent, selectedDay, teachersMaster]);

            // 요일이나 결강교사가 바뀔 때 자동 교시 설정
            useEffect(() => {
                if (selectedAbsent) {
                    if (availablePeriods.length > 0) {
                        setSelectedPeriod((prev) => availablePeriods.includes(prev) ? prev : availablePeriods[0]);
                    } else {
                        setSelectedPeriod(-1); // 수업이 없는 날
                    }
                }
            }, [availablePeriods, selectedAbsent]);

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(null), 3000);
            };

            // 누적 기록 자동 저장
            useEffect(() => {
                localStorage.setItem('smartSubHistory', JSON.stringify(subHistory));
            }, [subHistory]);

            // 안전한 CSV 라인 파서 (쌍따옴표 내 콤마 무시 처리)
            const parseCSVLine = (text) => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const c = text[i];
                    if (c === '"') {
                        inQuotes = !inQuotes;
                    } else if (c === ',' && !inQuotes) {
                        result.push(current);
                        current = '';
                    } else {
                        current += c;
                    }
                }
                result.push(current);
                return result.map(s => s.trim());
            };

            // 앱 시작 시 CSV 텍스트 강력 파싱 (공백 무시 및 강력 추적기법 적용)
            useEffect(() => {
                try {
                    const teachersObj = {};
                    const deptMap = new Map();

                    // 1. 동교과 분류 파싱 및 기본 교사 명단 100% 셋업 (누락 방지)
                    RAW_DEPT_CSV.replace(/^\uFEFF/, '').split(/\r?\n/).forEach(line => {
                        if (line.trim() === "") return;
                        const parts = parseCSVLine(line);
                        if (parts.length >= 2) {
                            const dept = parts[0];
                            const name = parts[1];
                            if(dept && name) {
                                deptMap.set(name, dept);
                                teachersObj[name] = {
                                    id: name,
                                    name: name,
                                    dept: dept,
                                    schedule: {
                                        mon: ["", "", "", "", "", "", ""],
                                        tue: ["", "", "", "", "", "", ""],
                                        wed: ["", "", "", "", "", "", ""],
                                        thu: ["", "", "", "", "", "", ""],
                                        fri: ["", "", "", "", "", "", ""]
                                    }
                                };
                            }
                        }
                    });

                    // 2. 전체시간표 파싱
                    const rows = RAW_TIME_CSV.replace(/^\uFEFF/, '').split(/\r?\n/).map(r => parseCSVLine(r));
                    const classes = [];
                    let currentGrade = "1";
                    
                    let gradeRowIdx = -1;
                    let classRowIdx = -1;
                    for(let i = 0; i < Math.min(10, rows.length); i++) {
                        if(rows[i] && rows[i].some(cell => cell && cell.includes('학년'))) {
                            gradeRowIdx = i;
                            classRowIdx = i + 1;
                            break;
                        }
                    }

                    if (gradeRowIdx !== -1 && rows.length > classRowIdx) {
                        const maxLen = Math.max(rows[gradeRowIdx].length, rows[classRowIdx].length);
                        for (let i = 2; i < maxLen; i++) {
                            const gCell = rows[gradeRowIdx][i] || '';
                            if (gCell && gCell.includes('학년')) {
                                currentGrade = gCell.replace(/[^0-9]/g, ''); 
                            }
                            const cCell = rows[classRowIdx][i] || '';
                            if (cCell && cCell.includes('반')) {
                                classes[i] = `${currentGrade}-${cCell.replace(/[^0-9]/g, '')}`;
                            } else if (cCell && !isNaN(cCell) && cCell !== "") {
                                classes[i] = `${currentGrade}-${cCell}`;
                            }
                        }
                    }

                    const dayMap = { '월': 'mon', '화': 'tue', '수': 'wed', '목': 'thu', '금': 'fri', '월요일':'mon', '화요일':'tue', '수요일':'wed', '목요일':'thu', '금요일':'fri' };
                    
                    let currentDay = "";
                    let currentPeriodIdx = -1;
                    let currentSubjectRow = null;
                    const startRow = classRowIdx !== -1 ? classRowIdx + 1 : 4;

                    // 3. 교시와 교사를 유연하게 찾는 State-Machine 파싱
                    for (let i = startRow; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length === 0 || row.every(cell => cell === "")) continue; // 빈 줄 완전 무시

                        const c0 = row[0] || "";
                        const c1 = row[1] || "";

                        // 요일 업데이트
                        if (c0 && dayMap[c0]) currentDay = dayMap[c0];

                        // 교시 파악 (정규식으로 확인)
                        const pMatch = c0.match(/(\d+)교시/) || c1.match(/(\d+)교시/);
                        
                        // "n교시"라는 글자가 있거나 숫자가 있으면 과목 줄(Subject Row)로 판단
                        if (pMatch || (c1 && c1.includes('교시'))) {
                            let pNum = pMatch ? parseInt(pMatch[1]) : parseInt(c1.replace(/[^0-9]/g, ''));
                            currentPeriodIdx = pNum - 1;
                            currentSubjectRow = row; // 현재 줄을 과목 줄로 저장
                        } 
                        // 과목 줄이 이미 저장되어 있다면, 현재 줄은 무조건 교사 줄(Teacher Row)로 판단
                        else if (currentSubjectRow) {
                            const teacherRow = row;
                            
                            // 정상적인 범위의 교시일 때만 처리
                            if (currentPeriodIdx >= 0 && currentPeriodIdx <= 6 && currentDay) {
                                const maxCol = Math.max(currentSubjectRow.length, teacherRow.length);
                                
                                for (let c = 2; c < maxCol; c++) {
                                    const subject = currentSubjectRow[c] || "";
                                    const rawTeacher = teacherRow[c] || "";

                                    if (subject && rawTeacher && subject !== "공강" && rawTeacher !== "공강" && !subject.includes('교시')) {
                                        
                                        // 선생님 피드백 반영: '동교과분류' 명단을 기준으로 완벽 매칭!
                                        const rawTeacherTrimmed = rawTeacher.trim();
                                        let tName = "";
                                        
                                        // 1. 등록된 선생님 이름과 먼저 대조하여 정확히 추출 (기호, 공백 무시)
                                        for (const validName of deptMap.keys()) {
                                            if (rawTeacherTrimmed.includes(validName)) {
                                                tName = validName;
                                                break;
                                            }
                                        }
                                        
                                        // 2. 만약 명단에 없다면 한글 2~3글자만 안전하게 추출 ('허영' 2글자, 나머지 3글자)
                                        if (!tName) {
                                            const match = rawTeacherTrimmed.match(/[가-힣]{2,3}/);
                                            if (match) tName = match[0];
                                        }
                                        
                                        if (tName && tName.length >= 2) { 
                                            // 명단에 없는 선생님이면 새로 추가
                                            if (!teachersObj[tName]) {
                                                teachersObj[tName] = {
                                                    id: Object.keys(teachersObj).length + 1,
                                                    name: tName,
                                                    dept: deptMap.get(tName) || '미분류',
                                                    schedule: {
                                                        mon: ["", "", "", "", "", "", ""],
                                                        tue: ["", "", "", "", "", "", ""],
                                                        wed: ["", "", "", "", "", "", ""],
                                                        thu: ["", "", "", "", "", "", ""],
                                                        fri: ["", "", "", "", "", "", ""]
                                                    }
                                                };
                                            }
                                            
                                            // 과목 텍스트 조립 후 저장
                                            const classPrefix = classes[c] ? `${classes[c]} ` : "";
                                            teachersObj[tName].schedule[currentDay][currentPeriodIdx] = `${classPrefix}${subject}`.trim();
                                        }
                                    }
                                }
                            }
                            // 처리가 끝나면 다시 과목 줄을 찾도록 초기화
                            currentSubjectRow = null; 
                        }
                    }
                    setTeachersMaster(Object.values(teachersObj));
                } catch (error) {
                    console.error("CSV 파싱 오류:", error);
                    showToast("내장된 CSV 데이터에 오류가 있습니다.");
                }
            }, []);

            // --- 보강 배정 핵심 로직 ---
            const teacherCounts = useMemo(() => {
                const counts = {};
                subHistory.filter(s => s.semester === selectedSemester).forEach(s => {
                    counts[s.subName] = (counts[s.subName] || 0) + 1;
                });
                return counts;
            }, [subHistory, selectedSemester]);

            const isConsecutive = (teacher, day, pIdx) => {
                if (pIdx === -1) return false;
                const s = teacher.schedule[day];
                if (pIdx >= 2 && s[pIdx - 1] !== "" && s[pIdx - 2] !== "") return true;
                if (pIdx >= 1 && pIdx <= 5 && s[pIdx - 1] !== "" && s[pIdx + 1] !== "") return true;
                if (pIdx <= 4 && s[pIdx + 1] !== "" && s[pIdx + 2] !== "") return true;
                return false;
            };

            const topCandidates = useMemo(() => {
                if (!selectedAbsent || teachersMaster.length === 0 || selectedPeriod === -1) return [];
                const absentTeacher = teachersMaster.find(t => t.name === selectedAbsent);
                if (!absentTeacher) return [];

                const activeTeacherCounts = teachersMaster.map(t => teacherCounts[t.name] || 0);
                const minCount = activeTeacherCounts.length > 0 ? Math.min(...activeTeacherCounts) : 0;

                const freeOnes = teachersMaster.filter(t => 
                    t.name !== selectedAbsent && 
                    t.schedule[selectedDay][selectedPeriod] === "" &&
                    !isConsecutive(t, selectedDay, selectedPeriod)
                );

                const groupA = freeOnes.filter(t => 
                    t.dept === absentTeacher.dept && (teacherCounts[t.name] || 0) < minCount + 5
                ).sort((a, b) => (teacherCounts[a.name] || 0) - (teacherCounts[b.name] || 0) || a.name.localeCompare(b.name));

                const groupB = freeOnes.filter(t => 
                    t.dept === absentTeacher.dept && (teacherCounts[t.name] || 0) >= minCount + 5
                ).sort((a, b) => (teacherCounts[a.name] || 0) - (teacherCounts[b.name] || 0) || a.name.localeCompare(b.name));

                const groupC = freeOnes.filter(t => t.dept !== absentTeacher.dept)
                    .sort((a, b) => (teacherCounts[a.name] || 0) - (teacherCounts[b.name] || 0) || a.name.localeCompare(b.name));

                return [...groupA, ...groupB, ...groupC].slice(0, 5);
            }, [selectedAbsent, selectedDay, selectedPeriod, teachersMaster, teacherCounts]);

            const handleSubConfirm = (teacher) => {
                const absentTeacher = teachersMaster.find(t => t.name === selectedAbsent);
                const newRecord = {
                    id: Date.now().toString(),
                    semester: selectedSemester,
                    date: new Date().toLocaleDateString('ko-KR'),
                    day: selectedDay,
                    period: selectedPeriod + 1,
                    absentName: selectedAbsent,
                    absentDept: absentTeacher.dept,
                    subName: teacher.name,
                    subDept: teacher.dept,
                    classInfo: absentTeacher.schedule[selectedDay][selectedPeriod] || "기타 배정",
                    timestamp: Date.now()
                };
                
                setSubHistory(prev => [newRecord, ...prev]);
                setModalTeacher(null);
                setSelectedAbsent("");
                showToast(`${teacher.name} 선생님으로 보강이 확정 및 저장되었습니다.`);
            };

            const handleDeleteRecord = (id) => {
                if(window.confirm("이 보강 기록을 삭제하시겠습니까? (누적 횟수에서도 차감됩니다)")) {
                    setSubHistory(prev => prev.filter(r => r.id !== id));
                    showToast("기록이 삭제되었습니다.");
                }
            };

            const exportToCSV = () => {
                const currentData = subHistory.filter(h => h.semester === selectedSemester);
                if(currentData.length === 0) {
                    showToast("내보낼 데이터가 없습니다.");
                    return;
                }
                const header = "날짜,요일,교시,결강교사,결강과목,보강교사,학기\n";
                const rows = currentData.map(h => 
                    `"${h.date}","${h.day}","${h.period}교시","${h.absentName}","${h.classInfo}","${h.subName}","${h.semester}"`
                ).join("\n");
                
                const blob = new Blob(["\ufeff" + header + rows], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `보강누적기록부_${selectedSemester}.csv`;
                link.click();
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 pb-20 md:pb-0 font-sans selection:bg-blue-100 selection:text-blue-900">
                    
                    {/* 모바일 상단 헤더 */}
                    <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 sticky top-0 z-30 flex items-center justify-between md:hidden shadow-sm">
                        <h1 className="font-black text-xl text-blue-600 flex items-center gap-2">
                            <Database size={20} /> SmartSub
                        </h1>
                        <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded font-bold">{selectedSemester}</span>
                    </header>

                    <div className="flex flex-col md:flex-row min-h-screen">
                        {/* PC 사이드바 */}
                        <aside className="w-64 bg-slate-900 text-white p-6 hidden md:flex flex-col sticky top-0 h-screen shadow-xl z-20">
                            <h2 className="text-2xl font-black mb-10 flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl"><Database size={24}/></div>
                                SmartSub
                            </h2>
                            <nav className="space-y-3 flex-1">
                                {[
                                    { id: 'register', label: '보강 배정', icon: <UserCheck size={20}/> },
                                    { id: 'history', label: '누적 기록부', icon: <History size={20}/> },
                                    { id: 'stats', label: '교사별 통계', icon: <BarChart3 size={20}/> }
                                ].map(item => (
                                    <button 
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-sm font-bold transition-all ${activeTab === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30 translate-x-1' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}
                                    >
                                        {item.icon} {item.label}
                                    </button>
                                ))}
                            </nav>
                            <div className="pt-6 border-t border-slate-800">
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Storage Mode</p>
                                <div className="flex items-center gap-2 mt-2 text-xs font-bold text-green-400">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                    Local Storage Active
                                </div>
                            </div>
                        </aside>

                        {/* 메인 콘텐츠 영역 */}
                        <main className="flex-1 w-full max-w-5xl mx-auto p-4 md:p-10">
                            
                            {/* 1. 보강 배정 탭 */}
                            {activeTab === 'register' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <div className="hidden md:block">
                                        <h2 className="text-3xl font-black text-slate-800 tracking-tight">지능형 보강 배정</h2>
                                        <p className="text-slate-500 mt-2 font-medium">연강 방지 및 누적 횟수를 고려하여 최적의 교사를 추천합니다.</p>
                                    </div>

                                    <div className="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div>
                                            <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">결강 교사</label>
                                            <select className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold transition-shadow" value={selectedAbsent} onChange={e => setSelectedAbsent(e.target.value)}>
                                                <option value="">교사 선택</option>
                                                {[...teachersMaster]
                                                    .sort((a, b) => a.name.localeCompare(b.name))
                                                    .map(t => <option key={t.id} value={t.name}>[{t.dept}] {t.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 md:col-span-2">
                                            <div>
                                                <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">요일</label>
                                                <select className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold" value={selectedDay} onChange={e => setSelectedDay(e.target.value)}>
                                                    <option value="mon">월요일</option><option value="tue">화요일</option><option value="wed">수요일</option><option value="thu">목요일</option><option value="fri">금요일</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">교시</label>
                                                <select className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold" value={selectedPeriod} onChange={e => setSelectedPeriod(parseInt(e.target.value))} disabled={selectedAbsent !== "" && availablePeriods.length === 0}>
                                                    {selectedAbsent === "" ? (
                                                        [0,1,2,3,4,5,6].map(i => <option key={i} value={i}>{i+1}교시</option>)
                                                    ) : availablePeriods.length === 0 ? (
                                                        <option value="-1">해당 요일 수업 없음</option>
                                                    ) : (
                                                        availablePeriods.map(i => {
                                                            const t = teachersMaster.find(t => t.name === selectedAbsent);
                                                            const className = t ? t.schedule[selectedDay][i] : '';
                                                            return <option key={i} value={i}>{i+1}교시 ({className})</option>;
                                                        })
                                                    )}
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <h3 className="text-lg font-black text-slate-800 flex items-center gap-2 px-2">
                                            <Award size={20} className="text-blue-600" /> 공정 추천 후보 TOP 5
                                        </h3>
                                        
                                        {teachersMaster.length === 0 ? (
                                            <div className="bg-white p-12 md:p-20 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center text-slate-400">
                                                <AlertCircle className="mx-auto mb-4 opacity-20" size={56} />
                                                <p className="font-bold">시스템에 등록된 시간표가 없습니다.<br/>코드 상단의 <code>RAW_TIME_CSV</code> 변수에 데이터를 입력해주세요.</p>
                                            </div>
                                        ) : !selectedAbsent ? (
                                            <div className="bg-white p-12 md:p-20 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center text-slate-400">
                                                <Search className="mx-auto mb-4 opacity-20" size={56} />
                                                <p className="font-bold">결강 교사를 선택하면 AI가 최적의 후보를 분석합니다.</p>
                                            </div>
                                        ) : selectedPeriod === -1 ? (
                                            <div className="bg-slate-50 p-12 rounded-[2.5rem] border border-slate-200 text-center">
                                                <Layout size={48} className="mx-auto mb-4 text-slate-300" />
                                                <p className="text-slate-600 font-black text-lg">해당 요일에는 수업이 없습니다.</p>
                                                <p className="text-sm text-slate-400 mt-2 font-medium">결강 교사의 다른 요일을 선택해주세요.</p>
                                            </div>
                                        ) : topCandidates.length === 0 ? (
                                            <div className="bg-orange-50 p-12 rounded-[2.5rem] border border-orange-100 text-center">
                                                <AlertCircle size={48} className="mx-auto mb-4 text-orange-400" />
                                                <p className="text-orange-700 font-black text-lg">보강 가능한 교사가 없습니다.</p>
                                                <p className="text-sm text-orange-500 mt-2 font-medium">모든 교사가 수업 중이거나 3연강 제한에 해당됩니다.</p>
                                            </div>
                                        ) : topCandidates.map((t, idx) => (
                                            <button 
                                                key={t.id} 
                                                onClick={() => setModalTeacher(t)}
                                                className="w-full bg-white p-5 md:p-6 rounded-[2rem] border border-slate-200 flex items-center justify-between hover:border-blue-500 hover:shadow-lg transition-all text-left active:scale-[0.98] group"
                                            >
                                                <div className="flex items-center gap-5">
                                                    <div className={`w-12 h-12 md:w-14 md:h-14 rounded-2xl flex items-center justify-center font-black text-xl md:text-2xl ${idx === 0 ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>
                                                        {idx + 1}
                                                    </div>
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-lg md:text-xl font-black text-slate-800">{t.name}</span>
                                                            <span className={`text-[10px] font-black px-2 py-1 rounded uppercase tracking-wider ${t.dept === teachersMaster.find(a=>a.name===selectedAbsent)?.dept ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}`}>
                                                                {t.dept}
                                                            </span>
                                                        </div>
                                                        <div className="flex items-center gap-1 mt-1 text-xs font-bold text-slate-400">
                                                            <span>이번 학기 누적</span>
                                                            <span className="text-blue-500 mx-1">{teacherCounts[t.name] || 0}</span>
                                                            <span>회</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="bg-slate-50 p-3 rounded-2xl group-hover:bg-blue-50 transition-colors">
                                                    <ChevronRight className="text-slate-300 group-hover:text-blue-600" />
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 3. 누적 기록부 탭 */}
                            {activeTab === 'history' && (
                                <div className="space-y-6 animate-in fade-in duration-500">
                                    <header className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                                        <div>
                                            <h2 className="text-2xl md:text-3xl font-black text-slate-800">보강 누적 기록부</h2>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={exportToCSV} className="p-3 bg-white border border-slate-200 text-slate-600 rounded-xl font-black shadow-sm flex items-center gap-2 hover:bg-slate-50">
                                                <Download size={18}/> 엑셀 내보내기
                                            </button>
                                            <select className="p-3 bg-white border border-slate-200 rounded-xl font-black outline-none shadow-sm" value={selectedSemester} onChange={e => setSelectedSemester(e.target.value)}>
                                                <option value="2026-1">2026-1학기</option>
                                                <option value="2026-2">2026-2학기</option>
                                            </select>
                                        </div>
                                    </header>

                                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left whitespace-nowrap">
                                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                                    <tr>
                                                        <th className="px-6 py-5">날짜 / 교시</th>
                                                        <th className="px-6 py-5">결강 정보</th>
                                                        <th className="px-6 py-5">보강 담당</th>
                                                        <th className="px-6 py-5">학급 / 과목</th>
                                                        <th className="px-6 py-5 text-right">관리</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50 text-sm">
                                                    {subHistory.filter(h => h.semester === selectedSemester).length === 0 ? (
                                                        <tr><td colSpan="5" className="py-24 text-center text-slate-400 font-bold">저장된 로컬 내역이 없습니다.</td></tr>
                                                    ) : subHistory.filter(h => h.semester === selectedSemester).map(h => (
                                                        <tr key={h.id} className="hover:bg-slate-50/80 transition-colors">
                                                            <td className="px-6 py-5">
                                                                <p className="font-black text-slate-700">{h.date}</p>
                                                                <p className="text-[10px] text-slate-400 font-bold mt-1 uppercase bg-slate-100 inline-block px-2 rounded-sm">{h.day} {h.period}교시</p>
                                                            </td>
                                                            <td className="px-6 py-5">
                                                                <div className="flex items-center gap-2">
                                                                    <div className="w-1.5 h-1.5 rounded-full bg-red-400"></div>
                                                                    <span className="font-black text-slate-600">{h.absentName}</span>
                                                                    <span className="text-[10px] font-bold text-slate-400 bg-slate-50 px-1.5 rounded">({h.absentDept})</span>
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-5">
                                                                <span className="font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg">{h.subName} 선생님</span>
                                                            </td>
                                                            <td className="px-6 py-5 font-bold text-slate-500">{h.classInfo}</td>
                                                            <td className="px-6 py-5 text-right">
                                                                <button onClick={() => handleDeleteRecord(h.id)} className="p-2 text-slate-300 hover:text-red-500 transition-colors">
                                                                    <Trash2 size={18} />
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 4. 통계 탭 */}
                            {activeTab === 'stats' && (
                                <div className="space-y-6 animate-in fade-in duration-500">
                                    <header>
                                        <h2 className="text-3xl font-black text-slate-800">교사별 누적 통계</h2>
                                        <p className="text-slate-500 mt-2 font-medium">선택된 학기의 전체 보강 횟수 분포입니다.</p>
                                    </header>
                                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                        {[...teachersMaster]
                                            .sort((a, b) => a.name.localeCompare(b.name))
                                            .map(t => {
                                            const count = teacherCounts[t.name] || 0;
                                            return (
                                                <div key={t.id} className="bg-white p-5 rounded-[1.5rem] border border-slate-200 shadow-sm flex flex-col justify-between">
                                                    <div className="flex items-center justify-between mb-4">
                                                        <span className="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-0.5 rounded">{t.dept}</span>
                                                        {count > 5 && <AlertCircle size={14} className="text-orange-500" />}
                                                    </div>
                                                    <div>
                                                        <h4 className="text-lg font-black text-slate-800">{t.name}</h4>
                                                        <div className="mt-2 flex items-baseline gap-1">
                                                            <span className={`text-3xl font-black ${count > 5 ? 'text-orange-500' : 'text-blue-600'}`}>{count}</span>
                                                            <span className="text-xs font-bold text-slate-400">회</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* 모바일 전용 하단 탭 바 */}
                    <footer className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 px-2 py-2 flex justify-around md:hidden z-40 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                        {[
                            { id: 'register', label: '배정', icon: <UserCheck size={22}/> },
                            { id: 'history', label: '기록', icon: <History size={22}/> },
                            { id: 'stats', label: '통계', icon: <BarChart3 size={22}/> }
                        ].map(item => (
                            <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex flex-col items-center gap-1.5 p-2 w-16 transition-all ${activeTab === item.id ? 'text-blue-600 -translate-y-1' : 'text-slate-400 hover:text-slate-600'}`}>
                                {item.icon}
                                <span className="text-[10px] font-black">{item.label}</span>
                            </button>
                        ))}
                    </footer>

                    {/* 시간표 상세 및 확정 모달 (Custom UI) */}
                    {modalTeacher && (
                        <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-4">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onClick={() => setModalTeacher(null)}></div>
                            <div className="relative bg-white w-full max-w-lg rounded-t-[2.5rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl animate-in slide-in-from-bottom-8 duration-300 max-h-[90vh] flex flex-col">
                                <div className="bg-slate-900 text-white p-8 md:p-10 shrink-0">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h4 className="text-3xl font-black">{modalTeacher.name} 선생님</h4>
                                            <div className="flex items-center gap-2 mt-3">
                                                <span className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold">{modalTeacher.dept}</span>
                                                <span className="bg-blue-500 px-3 py-1 rounded-full text-xs font-bold">누적 {teacherCounts[modalTeacher.name] || 0}회</span>
                                            </div>
                                        </div>
                                        <button onClick={() => setModalTeacher(null)} className="p-2 hover:bg-white/20 rounded-full transition-colors"><X size={24}/></button>
                                    </div>
                                </div>
                                <div className="p-6 md:p-10 overflow-y-auto hide-scrollbar">
                                    <h5 className="font-black text-slate-800 mb-4 flex items-center gap-2"><Layout size={18} className="text-blue-600"/> 1주일 시간표 미리보기</h5>
                                    <div className="bg-slate-50 p-2 rounded-2xl border border-slate-100">
                                        <table className="w-full text-[10px] md:text-xs">
                                            <thead>
                                                <tr className="text-slate-400 font-black border-b border-slate-200 uppercase">
                                                    <th className="py-3">교시</th>{['월','화','수','목','금'].map(d => <th key={d}>{d}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {[0,1,2,3,4,5,6].map(pIdx => (
                                                    <tr key={pIdx}>
                                                        <td className="py-2.5 text-center text-slate-400 font-black bg-white">{pIdx+1}</td>
                                                        {['mon','tue','wed','thu','fri'].map(day => {
                                                            const isTarget = day === selectedDay && pIdx === selectedPeriod;
                                                            const content = modalTeacher.schedule[day][pIdx];
                                                            return (
                                                                <td key={day} className={`p-1 text-center ${isTarget ? 'bg-blue-100' : 'bg-white'}`}>
                                                                    {isTarget ? (
                                                                        <div className="bg-blue-600 text-white py-1.5 px-1 rounded-lg font-black animate-pulse shadow-sm">배정예정</div>
                                                                    ) : content ? (
                                                                        <div className="bg-slate-100 text-slate-500 py-1.5 px-1 rounded-lg font-bold truncate max-w-[50px] mx-auto opacity-70">{content}</div>
                                                                    ) : <span className="text-slate-200">-</span>}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="mt-8 flex gap-3 shrink-0">
                                        <button onClick={() => setModalTeacher(null)} className="flex-1 py-4 md:py-5 bg-slate-100 text-slate-500 font-black rounded-2xl hover:bg-slate-200 transition-all">취소</button>
                                        <button onClick={() => handleSubConfirm(modalTeacher)} className="flex-[2] py-4 md:py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">이 기록 확정하기</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Custom Toast 알림 */}
                    {toastMsg && (
                        <div className="fixed bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 z-50 toast-animate">
                            <div className="bg-slate-800 text-white px-6 py-4 rounded-2xl shadow-2xl font-bold flex items-center gap-3 min-w-[300px] justify-center text-sm md:text-base">
                                <CheckCircle2 className="text-green-400" size={20} />
                                {toastMsg}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
